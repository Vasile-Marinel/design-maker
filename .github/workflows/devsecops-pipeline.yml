name: DevSecOps Pipeline - Design Maker

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Least Privilege: token-ul are doar permisiuni de citire
permissions:
  contents: read

jobs:
  security_scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # necesar pentru scanarea intregului istoric Git (TruffleHog)

      # ── 1. SCA (Software Composition Analysis) ──
      # Colectam raportul complet in JSON, blocam pipeline-ul doar pe Critical
      # Decizia de a bloca sau nu build-ul devine o politica explicita,
      # nu un efect secundar.
      - name: SCA - NPM Audit (dependency vulnerabilities)
        run: |
          echo "=== NPM Audit Report ===" 
          npm audit --json > npm-audit-report.json || true
          npm audit --audit-level=critical

      # Raportul e disponibil ca artifact indiferent de rezultatul scanarii
      - name: Upload NPM Audit Report
        uses: actions/upload-artifact@v6
        if: always()  # Uploadam raportul indiferent daca pasul anterior a esuat
        with:
          name: npm-audit-report
          path: npm-audit-report.json

      # ── 2. Secret Scanning ───
      # Scaneaza intregul istoric Git dupa chei API, token-uri, credentiale
      - name: Secret Detection - TruffleHog
        uses: trufflesecurity/trufflehog@v3.94.3
        with:
          path: ./

      # ── 3. SAST (Static Application Security Testing) ───
      # Analiza statica pe codul sursa JS/Node.js/React cu reguli de securitate
      - name: SAST - Semgrep
        uses: semgrep/semgrep-action@v1 # v1
        with:
          config: >-
            p/javascript
            p/nodejs
            p/react
            p/secrets
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
