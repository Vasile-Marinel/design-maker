name: DevSecOps Pipeline - Design Maker

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# ÎMBUNĂTĂȚIRE 1: Least Privilege pentru GitHub Actions token
# Implicit, token-ul are permisiuni de scriere. Declarând read-all aplicăm
# principiul least privilege — dacă un step este compromis, nu poate modifica repo-ul.
permissions:
  contents: read

jobs:
  security_scan:
    runs-on: ubuntu-latest
    
    steps:
      # ÎMBUNĂTĂȚIRE 2: Pin la SHA hash, nu la tag
      # actions/checkout@v4 este un tag mutabil — dacă repo-ul upstream este
      # compromis și tag-ul este mutat, rulăm cod arbitrar. SHA-ul este imutabil.
      # Aceasta este o măsură de securitate a supply chain-ului CI/CD în sine.
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0  # Necesar pentru TruffleHog să scaneze întregul istoric

      # ── 1. SCA (Software Composition Analysis) ──────────────────────────────
      # ÎMBUNĂTĂȚIRE 3: Separăm auditarea de gate-ul pipeline-ului
      # npm audit cu --audit-level=high returnează exit code 1 dacă găsește
      # vulnerabilități, oprind pipeline-ul ÎNAINTE ca SAST și secret scanning
      # să ruleze. Folosim || true pentru a continua, și salvăm raportul pentru
      # analiză. Decizia de a bloca sau nu build-ul devine o politică explicită,
      # nu un efect secundar.
      - name: SCA - NPM Audit (dependency vulnerabilities)
        run: |
          echo "=== NPM Audit Report ===" 
          npm audit --json > npm-audit-report.json || true
          npm audit --audit-level=critical || echo "⚠️ Critical vulnerabilities found - review npm-audit-report.json"
        # Notă: blocăm doar pe Critical. High-urile sunt documentate separat
        # ca trade-off conștient (vezi secțiunea Analiza Riscului din raport).

      - name: Upload NPM Audit Report
        uses: actions/upload-artifact@v4
        if: always()  # Uploadăm raportul indiferent dacă pasul anterior a eșuat
        with:
          name: npm-audit-report
          path: npm-audit-report.json

      # ── 2. Secret Scanning ───────────────────────────────────────────────────
      # ÎMBUNĂTĂȚIRE 4: Pin TruffleHog la SHA + scanare mai largă
      # trufflehog@main este un branch mutabil — risc de supply chain attack.
      # Eliminăm --only-verified: vrem să detectăm și secrete invalide/revocate
      # din istoric (un secret Firebase revocat în cod este tot un incident de
      # securitate care trebuie documentat și înțeles).
      - name: Secret Detection - TruffleHog
        uses: trufflesecurity/trufflehog@v3.94.3 # v3.88.8
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          # Fără --only-verified: raportăm toate secretele potențiale,
          # verificarea validității o facem manual în procesul de remediere

      # ── 3. SAST (Static Application Security Testing) ───────────────────────
      # ÎMBUNĂTĂȚIRE 5: Organizația Semgrep s-a schimbat
      # returntocorp/semgrep-action@v1 este deprecated. Action-ul curent
      # este semgrep/semgrep-action. Folosim și reguli specifice pentru
      # Node.js/React în plus față de p/javascript generic.
      - name: SAST - Semgrep
        uses: semgrep/semgrep-action@v1 # v1
        with:
          config: >-
            p/javascript
            p/nodejs
            p/react
            p/secrets
        env:
          # Fără SEMGREP_APP_TOKEN rulează în modul offline (fără dashboard)
          # Adaugă token-ul în GitHub Secrets dacă vrei rezultate în Semgrep Cloud
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
